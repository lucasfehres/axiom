apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
    name: gitlab
    namespace: gitlab
spec:
    interval: 1h
    chart:
        spec:
            chart: gitlab
            version: "9.10.1"
            sourceRef:
                kind: HelmRepository
                name: gitlab
                namespace: gitlab
    values:
        global:
            hosts:
                domain: gitlab.axiom.lucasfehres.nl
            prometheus:
                install: false
            grafana:
                enabled: false
            kas:
                enabled: false
            registry:
                enabled: false

            psql:
                host: gitlab-postgres-rw
                password:
                    key: password
                    secret: gitlab-postgres-app

        gitlab:
            webservice:
                minReplicas: 1
                maxReplicas: 1
                workerProcesses: 0
                resources:
                    requests:
                        cpu: 100m
                        memory: 800Mi
                    limits:
                        cpu: 500m
                        memory: 1Gi

            sidekiq:
                minReplicas: 1
                maxReplicas: 1
                concurrency: 5
                resources:
                    requests:
                        cpu: 50m
                        memory: 256Mi
                    limits:
                        cpu: 200m
                        memory: 400Mi

            gitaly:
                persistence:
                    size: 5Gi
                    storageClass: rook-ceph-block
                resources:
                    requests:
                        cpu: 50m
                        memory: 128Mi
                    limits:
                        cpu: 200m
                        memory: 256Mi

            toolbox:
                enabled: false

        prometheus:
            install: false
        postgresql:
            install: false

        redis:
            resources:
                requests:
                    cpu: 50m
                    memory: 64Mi
                limits:
                    cpu: 100m
                    memory: 128Mi

        gitlab-runner:
            install: false
