apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
    name: gitlab
    namespace: gitlab
spec:
    interval: 1h
    chart:
        spec:
            chart: gitlab
            version: "9.10.1"
            sourceRef:
                kind: HelmRepository
                name: gitlab
                namespace: gitlab
    values:
        global:
            ingress:
                # not spending $10pm on a loadbalancer
                enabled: false

            hosts:
                domain: gitlab.axiom.lucasfehres.nl
                https: false
            prometheus:
                install: false
            grafana:
                enabled: false
            kas:
                enabled: false
            registry:
                enabled: false
            ingress:
                configureCertmanager: false

        certmanager-issuer:
            email: DONOTMAKEACERTMANAGERCONFIG@gitlab.com

        registry:
            enabled: false

        gitlab:
            webservice:
                minReplicas: 1
                maxReplicas: 1
                workerProcesses: 0
                resources:
                    requests:
                        cpu: 250m
                        memory: 400Mi
                    limits:
                        cpu: 2
                        memory: 2Gi

            sidekiq:
                minReplicas: 1
                maxReplicas: 1
                concurrency: 5
                resources:
                    requests:
                        cpu: 250m
                        memory: 256Mi
                    limits:
                        cpu: 2
                        memory: 2Gi

            gitaly:
                persistence:
                    size: 5Gi
                    storageClass: sata
                resources:
                    requests:
                        cpu: 25m
                        memory: 128Mi
                    limits:
                        cpu: 200m
                        memory: 256Mi

            toolbox:
                enabled: false

        prometheus:
            install: false
        postgresql:
            primary:
                persistence:
                    storageClass: sata
                    size: 5Gi

        minio:
            resources:
                cpu: 25m
                memory: 128m
            persistence:
                size: 5Gi
                storageClass: sata

        redis:
            persistence:
                storageClass: sata
                size: 5Gi
            resources:
                requests:
                    cpu: 25m
                    memory: 64Mi
                limits:
                    cpu: 100m
                    memory: 128Mi
            replica:
                persistence:
                    storageClass: sata
                    size: 5Gi
                resources:
                    requests:
                        cpu: 25m
                        memory: 64Mi
                    limits:
                        cpu: 100m
                        memory: 128Mi
            master:
                persistence:
                    storageClass: sata
                    size: 5Gi
                resources:
                    requests:
                        cpu: 25m
                        memory: 64Mi
                    limits:
                        cpu: 100m
                        memory: 128Mi

        gitlab-runner:
            install: false

        nginx-ingress:
            # this makes a LoadBalancer ._.
            enabled: false
