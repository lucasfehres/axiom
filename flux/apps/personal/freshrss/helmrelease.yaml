apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
    name: freshrss
    namespace: freshrss
spec:
    interval: 30m
    chart:
        spec:
            chart: freshrss
            version: "2.12.4"
            sourceRef:
                kind: HelmRepository
                name: freshrss
                namespace: freshrss
            interval: 12h
    install:
        crds: CreateReplace
        remediation:
            retries: 3
    upgrade:
        crds: CreateReplace
        remediation:
            retries: 3
    values:
        freshrss:
            baseUrl: "https://freshrss.internal.axiom.lucasfehres.nl"
            timezone: "Europe/Amsterdam"
            database:
                type: postgresql
            initialization:
                enabled: true
                admin:
                    email: "lucasfehres@gmail.com"
                    # o_o
                    password: "verysecurepassword"
                    username: lucasf
            persistence:
                data:
                    size: 1Gi
                extensions:
                    size: 1Gi
                storageClass: rook-ceph-block

        externalPostgresql:
            auth:
                database: app
                username: app
                existingSecret: freshrss-postgres-app
                userPasswordKey: password
            hostname: vaultwarden-postgres-rw
