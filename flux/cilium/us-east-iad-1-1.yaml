cluster:
    id: 101
    name: us-east-iad-1-1

ipam:
    mode: cluster-pool
    operator:
        clusterPoolIPv4PodCIDRList:
            - "10.101.0.0/16"
        clusterPoolIPv4MaskSize: 24 # per-node slice size

kubeProxyReplacement: true
k8sServiceHost: "hcp-c1fac073-d357-4413-b45e-df5974feea85.spot.rackspace.com"
k8sServicePort: "443"

bpf:
    masquerade: true

# I don't think this is even a valid option
# nodePort:
#     enabled: true

# required for accessing the 10.67.3.0/8 block from K8s nodes
# socketLB:
#     enabled: true

envoy:
    enabled: false
#     affinity:
#         nodeAffinity:
#             requiredDuringSchedulingIgnoredDuringExecution:
#                 nodeSelectorTerms:
#                     - matchExpressions:
#                           - key: liqo.io/type
#                             operator: DoesNotExist
#     securityContext:
#         capabilities:
#             keepCapNetBindService: true
#             envoy:
#                 # Add NET_BIND_SERVICE to the list (keep the others!)
#                 - NET_BIND_SERVICE
#                 # Used since cilium proxy uses setting IPPROTO_IP/IP_TRANSPARENT
#                 - NET_ADMIN
#                 # We need it for now but might not need it for >= 5.11 specially
#                 # for the 'SYS_RESOURCE'.
#                 # In >= 5.8 there's already BPF and PERMON capabilities
#                 - SYS_ADMIN

affinity:
    nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
                - matchExpressions:
                      - key: liqo.io/type
                        operator: DoesNotExist

prometheus:
    enabled: true
operator:
    prometheus:
        enabled: true
hubble:
    enabled: true
    relay:
        enabled: true
    ui:
        enabled: true
    metrics:
        enableOpenMetrics: true
        enabled:
            - dns
            - drop
            - tcp
            - flow
            - port-distribution
            - icmp
            - httpV2:exemplars=true;labelsContext=source_ip,source_namespace,source_workload,destination_ip,destination_namespace,destination_workload,traffic_direction
