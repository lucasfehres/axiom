apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
    name: loki
    namespace: observability
spec:
    interval: 30m
    chart:
        spec:
            chart: loki
            version: "6.53.0"
            sourceRef:
                kind: HelmRepository
                name: loki
                namespace: observability
            interval: 12h
    install:
        crds: CreateReplace
        remediation:
            retries: 3
    upgrade:
        crds: CreateReplace
        remediation:
            retries: 3
    values:
        global:
            dnsService: rke2-coredns-rke2-coredns

        loki:
            # run in single tenant mode
            auth_enabled: false

            storage:
                bucketNames:
                    chunks: lucasfehres.axiom.loki.chunks
                    ruler: lucasfehres.axiom.loki.ruler

                use_thanos_objstore: true
                object_store:
                    s3:
                        endpoint: eu2.contabostorage.com
                        access_key_id: "${GRAFANALOKIS3ACCESKEYID}"
                        secret_access_key: "${GRAFANALOKIS3SECRETACCESSKEY}"
                        insecure: false

            ui:
                enabled: true

            # https://grafana.com/docs/loki/latest/operations/storage/retention/#compactor
            compactor:
                working_directory: /tmp/retention
                compaction_interval: 10m
                retention_enabled: true
                retention_delete_delay: 2h
                retention_delete_worker_count: 150
                delete_request_store: s3
            schemaConfig:
                configs:
                    - from: "2025-02-20"
                      index:
                          period: 24h
                          prefix: index_
                      object_store: s3
                      schema: v13
                      store: tsdb
            limits_config:
                retention_period: 168h

        write:
            replicas: 1
            persistence:
                storageClass: rook-ceph-block
                size: 2Gi

        read:
            replicas: 1

        backend:
            replicas: 1
            persistence:
                storageClass: rook-ceph-block
                size: 2Gi

            extraArgs:
                - "-config.expand-env=true"
            extraEnv:
                - name: GRAFANALOKIS3ACCESKEYID
                  valueFrom:
                      secretKeyRef:
                          name: axiom-s3-creds
                          key: ACCESS_KEY_ID
                - name: GRAFANALOKIS3SECRETACCESSKEY
                  valueFrom:
                      secretKeyRef:
                          name: axiom-s3-creds
                          key: ACCESS_SECRET_KEY

        chunksCache:
            enabled: false

        memberlist:
            service:
                # resolves a circular dependency issue
                publishNotReadyAddresses: true
