apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
    name: loki-write
    namespace: observability
spec:
    parentRefs:
        - name: internal-gateway
          namespace: kube-system
    hostnames:
        - "loki-write.internal.axiom.lucasfehres.nl"
    rules:
        - matches:
              - path:
                    type: PathPrefix
                    value: /
          backendRefs:
              - name: loki-write
                port: 3100
