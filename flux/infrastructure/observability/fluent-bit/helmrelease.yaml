apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
    name: fluent-bit
    namespace: observability
spec:
    interval: 30m
    chart:
        spec:
            chart: fluent-bit
            version: "0.57.6"
            sourceRef:
                kind: HelmRepository
                name: fluent-bit
                namespace: observability
            interval: 12h
    install:
        crds: CreateReplace
        remediation:
            retries: 3
    upgrade:
        crds: CreateReplace
        remediation:
            retries: 3
    values:
        config:
            outputs: |
                [OUTPUT]
                    Name                    loki
                    Match                   kube.*

                    Host                    loki-write.internal.axiom.lucasfehres.nl
                    Port                    443
                    Tls                     on
                    Tls.verify              on

                    Labels                  job=kube-fluentbit
                    Auto_Kubernetes_Labels  on
        serviceMonitor:
            enabled: true
