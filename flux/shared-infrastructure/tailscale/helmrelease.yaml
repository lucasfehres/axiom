apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
    name: tailscale
    namespace: tailscale
spec:
    interval: 30m
    chart:
        spec:
            chart: tailscale-operator
            version: "1.94.2"
            sourceRef:
                kind: HelmRepository
                name: tailscale
                namespace: tailscale
            interval: 12h
    install:
        crds: CreateReplace
        remediation:
            retries: 3
    upgrade:
        crds: CreateReplace
        remediation:
            retries: 3
    values:
