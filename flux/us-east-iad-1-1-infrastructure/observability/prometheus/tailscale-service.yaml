apiVersion: v1
kind: Service
metadata:
    name: thanos-tailscale
    namespace: chaos-observability
    labels:
        app.kubernetes.io/instance: prometheus
        app.kubernetes.io/part-of: kube-prometheus-stack
    annotations:
        tailscale.com/expose: "true"
        tailscale.com/hostname: thanos-us-east-iad-1-1
spec:
    type: ClusterIP
    selector:
        app.kubernetes.io/name: prometheus
        operator.prometheus.io/name: prometheus-kube-prometheus-prometheus
    ports:
        - name: grpc
          protocol: TCP
          port: 10901
          targetPort: grpc
        - name: http
          protocol: TCP
          port: 10902
          targetPort: http
