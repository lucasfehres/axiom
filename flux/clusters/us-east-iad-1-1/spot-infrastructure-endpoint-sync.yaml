apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
    name: spot-infrastructure-endpoint-sync
    namespace: flux-system
spec:
    interval: 10m
    sourceRef:
        kind: GitRepository
        name: flux-system
    path: ./flux/spot-infrastructure/endpoint-sync
    prune: true
    wait: true
    timeout: 10m
