apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
    name: spot-infrastructure-local-path-provisioner
    namespace: flux-system
spec:
    interval: 10m
    sourceRef:
        kind: GitRepository
        name: flux-system
    path: ./flux/spot-infrastructure/local-path-provisioner
    prune: true
    wait: true
    timeout: 10m
